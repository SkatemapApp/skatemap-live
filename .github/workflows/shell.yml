name: Shell Script Quality
permissions:
  contents: read

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.sh'
      - '**/*.bats'
      - 'scripts/git-hooks/**'
      - '.github/workflows/shell.yml'
      - '.shellcheckrc'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.sh'
      - '**/*.bats'
      - 'scripts/git-hooks/**'
      - '.github/workflows/shell.yml'
      - '.shellcheckrc'

jobs:
  quality:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install shfmt
      run: |
        # Pin to v3.8.0 for reproducible builds - update quarterly
        wget -O /tmp/shfmt https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64
        chmod +x /tmp/shfmt
        sudo mv /tmp/shfmt /usr/local/bin/shfmt

    - name: Install shellcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Check shell script formatting
      run: |
        echo "Checking shell script formatting..."
        shfmt -i 2 -d .

    - name: Lint shell scripts
      run: |
        echo "Linting shell scripts..."
        # .shellcheckrc handles disable rules, severity must be CLI flag
        find . -name "*.sh" -type f -exec shellcheck --severity=warning {} +
        find . -name "*.bats" -type f -exec shellcheck --severity=warning {} +
        shellcheck --severity=warning scripts/git-hooks/pre-commit scripts/git-hooks/commit-msg

  docker-entrypoint-tests:

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v5

    - name: Install BATS
      run: |
        sudo apt-get update
        sudo apt-get install -y bats parallel

    - name: Run Docker entrypoint integration tests
      run: |
        cd services/api/test
        bats --jobs 4 test-docker-entrypoint.bats
